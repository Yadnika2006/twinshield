services:
  web:
    build:
      context: .
      # We would typically use a Dockerfile.dev here, but assuming fallback to a standard Node Dockerfile if it exists.
      # For now, we will use the default command to run `npm run dev`.
      dockerfile: Dockerfile
    container_name: twinshield-web
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_GATEWAY_WS_URL=ws://localhost:4000
    depends_on:
      - gateway
    networks:
      - twinshield-net
    # Overriding default CMD to run dev server
    command: npm run dev

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: twinshield-gateway
    ports:
      - "4000:4000"
    volumes:
      - ./gateway/src:/app/src
    environment:
      - PORT=4000
    networks:
      - twinshield-net
    # Overriding the Dockerfile CMD to use nodemon for hot-reloading
    command: node dist/index.js

  victim-sqli:
    build:
      context: ./victim-twin/sql-storm
      dockerfile: Dockerfile
    container_name: twinshield-victim-sqli
    ports:
      - "5001:5000"
    environment:
      - SESSION_ID=dev-session
      - GATEWAY_URL=http://gateway:4000
    networks:
      - twinshield-net

networks:
  twinshield-net:
    driver: bridge
