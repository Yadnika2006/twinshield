<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CorpBank Secure Portal</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: #f0f4f8;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            width: 320px;
            background: #fff;
            border: 1px solid #dde3ea;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .logo-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        .logo-box {
            width: 56px;
            height: 56px;
            background: #1a3c6e;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 800;
            font-size: 1.4rem;
        }
        .title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1a3c6e;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        label {
            font-size: 0.75rem;
            color: #555;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        input {
            background: #f5f7fa;
            border: 1px solid #c8d0db;
            border-radius: 4px;
            padding: 10px 12px;
            font-size: 0.9rem;
            color: #333;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: #1a3c6e;
        }
        .btn {
            background: #1a3c6e;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #132b4f;
        }
        .footer {
            font-size: 0.7rem;
            color: #888;
            text-align: center;
            margin-top: 10px;
        }
        #result-box {
            display: none;
            padding: 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            word-break: break-all;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .success {
            background: #d4edda !important;
            color: #155724 !important;
            border-color: #c3e6cb !important;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-area">
            <div class="logo-box">CB</div>
            <div class="title">CorpBank Secure Portal</div>
        </div>

        <div id="result-box"></div>

        <form id="login-form">
            <div class="form-group">
                <label>USERNAME</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label>PASSWORD</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn">SIGN IN</button>
        </form>

        <div class="footer">
            Internal Corporate Use Only.<br>
            All connection attempts are monitored.
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = e.target.querySelector('button');
            btn.textContent = 'AUTHENTICATING...';
            btn.disabled = true;

            const formData = new FormData(e.target);

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                
                const box = document.getElementById('result-box');
                box.style.display = 'block';
                
                if (data.success) {
                    box.className = 'success';
                    let html = `<strong>Login Successful!</strong><br>Welcome, ${data.user.username}<br><br>`;
                    if (data.user.is_admin) {
                        html += `<em>Admin Access Granted</em><br>`;
                    }
                    if (data.rawData) {
                        html += `Extracted Data:<br><pre>${JSON.stringify(data.rawData, null, 2)}</pre>`;
                    }
                    box.innerHTML = html;
                } else {
                    box.className = '';
                    box.innerHTML = `<strong>Access Denied</strong><br>${data.error || 'Invalid credentials'}`;
                }
            } catch (err) {
                console.error(err);
            } finally {
                btn.textContent = 'SIGN IN';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
